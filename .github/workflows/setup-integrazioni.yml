name: Setup integrazioni SuperMastro

on:
  workflow_dispatch:

env:
  NODE_VERSION: "22.16.0"
  NODE_OPTIONS: --max-old-space-size=8192
  SUPABASE_PROJECT_REF: edsvmnxojsmknjuhobqa
  CLOUDFLARE_ACCOUNT_ID: ce7125d817d6c6ecd8c765b60ac4e0d0
  CLOUDFLARE_WORKER_NAME: supermastro-sos

jobs:
  setup:
    name: Migrazioni + Functions + Worker secrets + Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Migrazioni Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_PROJECT_REF: ${{ env.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN mancante — skip migrazioni."
          else
            bash scripts/apply-supabase-migrations.sh
          fi

      - name: Deploy tutte le Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ env.SUPABASE_PROJECT_REF }}
          DEPLOY_ALL_FUNCTIONS: "1"
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN mancante — skip functions."
            exit 0
          fi
          npx supabase login --token "$SUPABASE_ACCESS_TOKEN"
          bash scripts/deploy-supabase-functions.sh

      - name: Worker secrets (runtime)
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN mancante."
            exit 1
          fi
          npm ci
          put_secret() {
            local name="$1"
            local value="$2"
            if [ -n "$value" ]; then
              echo "$value" | npx wrangler secret put "$name" --name "${{ env.CLOUDFLARE_WORKER_NAME }}"
              echo "  OK secret $name"
            else
              echo "  skip $name (vuoto)"
            fi
          }
          put_secret SUPABASE_SERVICE_ROLE_KEY "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          put_secret STRIPE_SECRET_KEY "${{ secrets.STRIPE_SECRET_KEY }}"
          put_secret STRIPE_WEBHOOK_SECRET "${{ secrets.STRIPE_WEBHOOK_SECRET }}"
          put_secret CRON_SECRET "${{ secrets.CRON_SECRET }}"
          put_secret TWILIO_ACCOUNT_SID "${{ secrets.TWILIO_ACCOUNT_SID }}"
          put_secret TWILIO_AUTH_TOKEN "${{ secrets.TWILIO_AUTH_TOKEN }}"
          put_secret TWILIO_FROM_NUMBER "${{ secrets.TWILIO_FROM_NUMBER }}"
          put_secret GOOGLE_MAPS_API_KEY "${{ secrets.GOOGLE_MAPS_API_KEY }}"
          put_secret OPENAI_API_KEY "${{ secrets.OPENAI_API_KEY }}"
          put_secret ELEVENLABS_API_KEY "${{ secrets.ELEVENLABS_API_KEY }}"

      - name: Deploy Worker
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: https://edsvmnxojsmknjuhobqa.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://anchecasa.it' }}
          ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
          ADMIN_REQUIRE_MFA: ${{ vars.ADMIN_REQUIRE_MFA || 'true' }}
          STRIPE_TRIAL_PRICE_ID: ${{ secrets.STRIPE_TRIAL_PRICE_ID }}
          STRIPE_PAID_PRICE_ID: ${{ secrets.STRIPE_PAID_PRICE_ID }}
        run: npm run deploy
