name: Deploy SuperMastro

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_all_functions:
        description: "Deploy tutte le Edge Functions Supabase"
        required: false
        default: false
        type: boolean
      run_migrations:
        description: "Applica migrazioni Supabase DB"
        required: false
        default: true
        type: boolean

concurrency:
  group: deploy-supermastro-main
  cancel-in-progress: false

env:
  NODE_VERSION: "22.16.0"
  NODE_OPTIONS: --max-old-space-size=8192
  SUPABASE_PROJECT_REF: edsvmnxojsmknjuhobqa
  CLOUDFLARE_ACCOUNT_ID: ce7125d817d6c6ecd8c765b60ac4e0d0
  CLOUDFLARE_WORKER_NAME: supermastro-sos

jobs:
  deploy-worker:
    name: Build & Cloudflare Workers
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Verifica secret Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN mancante in GitHub Secrets."
            exit 1
          fi

      - name: Worker secrets (runtime)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          put_secret() {
            local name="$1"
            local value="$2"
            if [ -n "$value" ]; then
              echo "$value" | npx wrangler secret put "$name" --name "${{ env.CLOUDFLARE_WORKER_NAME }}"
            fi
          }
          put_secret SUPABASE_SERVICE_ROLE_KEY "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          put_secret STRIPE_SECRET_KEY "${{ secrets.STRIPE_SECRET_KEY }}"
          put_secret STRIPE_WEBHOOK_SECRET "${{ secrets.STRIPE_WEBHOOK_SECRET }}"
          put_secret CRON_SECRET "${{ secrets.CRON_SECRET }}"
          put_secret ADMIN_EMAILS "${{ secrets.ADMIN_EMAILS }}"

      - name: Deploy Worker (OpenNext)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: https://edsvmnxojsmknjuhobqa.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL: https://supermastro.anchecasa.it
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
        run: npm run deploy

  supabase-functions:
    name: Supabase Edge Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Verifica funzioni da deployare
        id: functions
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.deploy_all_functions }}" = "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BASE="${{ github.event.before }}"
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE="HEAD~1"
          fi
          if git diff --name-only "$BASE" "${{ github.sha }}" | grep -qE '^(supabase/functions/|scripts/deploy-supabase-functions\.sh)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verifica secret Supabase
        id: supabase_token
        if: steps.functions.outputs.changed == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SUPABASE_ACCESS_TOKEN mancante — skip deploy Edge Functions."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - run: npm ci
        if: steps.functions.outputs.changed == 'true' && steps.supabase_token.outputs.ready == 'true'

      - name: Login Supabase CLI
        if: steps.functions.outputs.changed == 'true' && steps.supabase_token.outputs.ready == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: npx supabase login --token "$SUPABASE_ACCESS_TOKEN"

      - name: Deploy funzioni
        if: steps.functions.outputs.changed == 'true' && steps.supabase_token.outputs.ready == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ env.SUPABASE_PROJECT_REF }}
          DEPLOY_BASE_SHA: ${{ github.event.before }}
          DEPLOY_HEAD_SHA: ${{ github.sha }}
          DEPLOY_ALL_FUNCTIONS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_all_functions && '1' || '0' }}
        run: bash scripts/deploy-supabase-functions.sh

  supabase-migrations:
    name: Supabase DB migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Verifica migrazioni da applicare
        id: migrations
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.run_migrations }}" = "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BASE="${{ github.event.before }}"
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE="HEAD~1"
          fi
          if git diff --name-only "$BASE" "${{ github.sha }}" | grep -qE '^(supabase/migrations/|scripts/apply-supabase-migrations\.sh)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Applica migrazioni
        if: steps.migrations.outputs.changed == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_PROJECT_REF: ${{ env.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN mancante — skip migrazioni DB."
            exit 0
          fi
          bash scripts/apply-supabase-migrations.sh
